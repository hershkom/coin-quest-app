<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Security headers (also enforced via _headers / netlify.toml for Netlify) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <title>החנות שלי</title>
  <meta name="description" content="ברוכים הבאים לחנות שלי – מוצרים איכותיים במחירים הטובים ביותר">

  <!-- Google Fonts – Heebo (Hebrew-first) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== Navbar ===== -->
  <header>
    <nav class="navbar">
      <div class="container">
        <a href="index.html" class="logo">🛍️ החנות שלי</a>

        <button class="hamburger" aria-label="תפריט">
          <span></span><span></span><span></span>
        </button>

        <div class="nav-links">
          <a href="index.html" class="active">ראשי</a>
          <a href="index.html#products">מוצרים</a>
          <a href="cart.html" class="cart-link">
            🛒 עגלה
            <span class="cart-count" id="cartCount">0</span>
          </a>
        </div>
      </div>
    </nav>
  </header>

  <!-- ===== Hero ===== -->
  <section class="hero">
    <div class="container">
      <h1>ברוכים הבאים לחנות שלי</h1>
      <p>מוצרים איכותיים במחירים הטובים ביותר — משלוח לכל הארץ</p>
      <div class="hero-btns">
        <a href="#products" class="btn btn-primary">🛒 קנה עכשיו</a>
        <a href="cart.html" class="btn btn-secondary">🛍️ צפה בעגלה</a>
      </div>
    </div>
  </section>

  <!-- ===== Products ===== -->
  <section class="section" id="products">
    <div class="container">
      <h2 class="section-title">המוצרים שלנו</h2>

      <!-- Search & filter -->
      <div class="filters">
        <input
          type="search"
          id="searchInput"
          placeholder="🔍 חיפוש מוצרים..."
          class="search-input"
          autocomplete="off"
          maxlength="100"
        >
        <select id="categoryFilter" class="category-select">
          <option value="">כל הקטגוריות</option>
        </select>
      </div>

      <!-- Grid populated by app.js -->
      <div class="product-grid" id="productGrid" role="list" aria-live="polite">
        <div class="loading">
          <div class="spinner"></div><br>טוען מוצרים...
        </div>
      </div>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container">
      <p>© <span id="year"></span> החנות שלי | כל הזכויות שמורות</p>
      <div class="footer-links">
        <a href="#">מדיניות פרטיות</a>
        <a href="#">תנאי שימוש</a>
        <a href="mailto:info@example.com">יצירת קשר</a>
      </div>
    </div>
  </footer>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

  <!-- Firebase + App (ES modules) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
