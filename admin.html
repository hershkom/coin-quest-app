<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>ניהול מוצרים | החנות שלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #F1F5F9; }
    .hidden { display: none !important; }
  </style>
</head>
<body class="admin-page">

  <!-- ===== Login Panel ===== -->
  <div id="loginPanel">
    <div class="container">
      <div class="admin-card login-card">
        <div style="text-align:center;margin-bottom:1.5rem">
          <div style="font-size:2.5rem">🔐</div>
          <h2 style="margin-top:.5rem">כניסה לניהול</h2>
          <p style="color:var(--text-muted);font-size:.9rem">גישה לבעלי חנות בלבד</p>
        </div>
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail">אימייל</label>
            <input type="email" id="loginEmail" placeholder="admin@example.com" required autocomplete="username">
          </div>
          <div class="form-group">
            <label for="loginPassword">סיסמה</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <div id="loginError" class="login-error"></div>
          <button type="submit" id="loginBtn" class="btn btn-primary btn-full" style="margin-top:1rem">
            התחבר
          </button>
        </form>
        <p style="font-size:.8rem;color:var(--text-muted);text-align:center;margin-top:1rem">
          חשבון הניהול נוצר ב-Firebase Console. אין הרשמה עצמאית.
        </p>
      </div>
    </div>
  </div>

  <!-- ===== Admin Panel (shown after login) ===== -->
  <div id="adminPanel" class="hidden">

    <header class="admin-header">
      <h1>🛍️ ניהול החנות שלי</h1>
      <div style="display:flex;align-items:center;gap:1rem">
        <span style="font-size:.85rem;color:var(--text-muted)" id="userDisplay"></span>
        <button id="logoutBtn" class="btn btn-secondary btn-sm">יציאה</button>
      </div>
    </header>

    <div class="admin-body">
      <div class="admin-grid">

        <!-- ===== Add / Edit Form ===== -->
        <div class="admin-card">
          <h2 id="formTitle">הוסף מוצר חדש</h2>

          <form id="productForm" novalidate>
            <div class="form-group">
              <label for="fieldName">שם המוצר *</label>
              <input type="text" id="fieldName" placeholder="לדוגמה: חולצת כותנה" maxlength="120" required>
            </div>

            <div class="form-group">
              <label for="fieldDesc">תיאור</label>
              <textarea id="fieldDesc" placeholder="תיאור קצר של המוצר..." rows="3"
                style="width:100%;padding:.55rem .85rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:inherit;font-size:.9rem;resize:vertical;direction:rtl"
                maxlength="500"></textarea>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="fieldPrice">מחיר (₪) *</label>
                <input type="number" id="fieldPrice" placeholder="99.90" min="0" step="0.01" required>
              </div>
              <div class="form-group">
                <label for="fieldStock">כמות במלאי *</label>
                <input type="number" id="fieldStock" placeholder="10" min="0" step="1" required>
              </div>
            </div>

            <div class="form-group">
              <label for="fieldCategory">קטגוריה</label>
              <input type="text" id="fieldCategory" placeholder="לדוגמה: ביגוד" maxlength="60" list="categoryList">
              <datalist id="categoryList"></datalist>
            </div>

            <div class="form-group">
              <label for="fieldImage">כתובת תמונה (URL)</label>
              <input type="url" id="fieldImage" placeholder="https://example.com/image.jpg" maxlength="500">
              <small style="color:var(--text-muted);font-size:.78rem">
                העלה תמונות ל-<a href="https://imgbb.com" target="_blank" rel="noopener noreferrer">imgBB</a> (חינם) והדבק את הקישור
              </small>
              <img id="imgPreview" class="image-preview" alt="תצוגה מקדימה">
            </div>

            <div style="display:flex;gap:.75rem;margin-top:.5rem">
              <button type="submit" id="saveBtn" class="btn btn-primary btn-full">הוסף מוצר</button>
              <button type="button" id="cancelEdit" class="btn btn-secondary" style="display:none">ביטול</button>
            </div>
          </form>
        </div>

        <!-- ===== Product List ===== -->
        <div class="admin-card">
          <h2>מוצרים קיימים</h2>
          <div class="admin-product-list" id="productList">
            <p style="color:var(--text-muted)">טוען...</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast" id="adminToast" role="status" aria-live="polite"></div>

  <script type="module" src="js/admin.js"></script>

</body>
</html>
