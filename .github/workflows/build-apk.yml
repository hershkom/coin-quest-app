name: Build Android APK

on:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APKs (both flavors)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Two flavors now (S6): 'family' keeps the native AccessibilityService
      # game-time enforcement for sideloading onto Mike's own devices; 'play'
      # has it stripped out for eventual Google Play submission. Uploaded as
      # separate artifacts since they're different distribution channels.
      - name: Upload family-flavor APK
        uses: actions/upload-artifact@v4
        with:
          name: coin-quest-debug-apk-family
          path: android-app/app/build/outputs/apk/family/debug/app-family-debug.apk
          if-no-files-found: error

      - name: Upload play-flavor APK
        uses: actions/upload-artifact@v4
        with:
          name: coin-quest-debug-apk-play
          path: android-app/app/build/outputs/apk/play/debug/app-play-debug.apk
          if-no-files-found: error
